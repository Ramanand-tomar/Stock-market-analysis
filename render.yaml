services:
  - type: web
    name: nifty50-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB
        value: nifty50
      - key: JWT_SECRET
        generateValue: true
      - key: ML_MODELS_DIR
        value: /opt/render/project/src/ml/models
      - key: ML_DATA_DIR
        value: /opt/render/project/src/ml/data/processed
