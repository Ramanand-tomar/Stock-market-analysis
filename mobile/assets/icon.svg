  <!-- Tagline -->
  <text x="512" y="790" font-size="42" font-weight="600" fill="#3B82F6" text-anchor="middle" font-family="system-ui" letter-spacing="8">STOCK ANALYSER</text>

  <defs>
    <linearGradient id="iconGrad" x1="292" y1="200" x2="732" y2="640">
      <stop stop-color="#3B82F6"/>
