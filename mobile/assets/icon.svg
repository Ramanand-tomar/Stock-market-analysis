<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#0F172A"/>

  <!-- Glow circle -->
  <circle cx="512" cy="460" r="280" fill="#1E40AF" opacity="0.12"/>

  <!-- Main icon circle -->
  <circle cx="512" cy="420" r="220" fill="url(#iconGrad)"/>
  <circle cx="512" cy="420" r="195" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="3"/>

  <!-- Chart trend line -->
  <path d="M350 560 L410 500 L460 530 L510 460 L560 490 L610 380 L660 410" stroke="#10B981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Chart area fill -->
  <path d="M350 560 L410 500 L460 530 L510 460 L560 490 L610 380 L660 410 L660 590 L350 590 Z" fill="#10B981" fill-opacity="0.15"/>

  <!-- Grid lines -->
  <line x1="340" y1="430" x2="670" y2="430" stroke="white" stroke-opacity="0.06" stroke-width="2"/>
  <line x1="340" y1="480" x2="670" y2="480" stroke="white" stroke-opacity="0.06" stroke-width="2"/>
  <line x1="340" y1="530" x2="670" y2="530" stroke="white" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Candlesticks -->
  <line x1="390" y1="470" x2="390" y2="550" stroke="#EF4444" stroke-width="8" stroke-linecap="round"/>
  <line x1="440" y1="440" x2="440" y2="520" stroke="#10B981" stroke-width="8" stroke-linecap="round"/>
  <line x1="580" y1="400" x2="580" y2="490" stroke="#10B981" stroke-width="8" stroke-linecap="round"/>

  <!-- AI badge -->
  <circle cx="640" cy="320" r="32" fill="#F59E0B"/>
